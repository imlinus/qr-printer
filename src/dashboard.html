<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Printer | Control Panel</title>
    <style>
        /* BASE & LAYOUT (SMACSS) */
        :root {
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --bg: #0f1020;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1a1b3a, var(--bg));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* MODULES */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 0;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: stretch;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .card {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .card-left {
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            min-height: 250px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header p {
            color: var(--text-dim);
            margin: 8px 0 0;
            font-size: 14px;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(255, 255, 255, 0.07);
        }

        .button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
            margin-top: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.is-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            box-shadow: none;
            font-size: 13px;
        }

        .button.is-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .actions {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        /* STATE */
        .is-loading {
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .console {
            flex: 1;
            background: transparent;
            border: none;
            padding: 40px 40px 40px 30px;

            font-family: 'MesloLGS NF', 'Consolas', monospace;
            font-size: 11px;
            color: #4ade80;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .console::-webkit-scrollbar {
            width: 4px;
        }

        .console::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .console-line {
            opacity: 0.8;
            margin-bottom: 4px;
            animation: slideInLeft 0.3s ease-out;
        }

        .console-line.is-error {
            color: #ff4b2b;
            font-weight: bold;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 0.8; transform: translateX(0); }
        }

        /* TOOLTIP/NOTICE */
        .notice {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #4ade80;
            color: #000;
            border-radius: 10px;
            font-weight: 600;
            transform: translateX(200%);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="app">
            <div class="card-left">
                <header class="header">
                    <h1>QR Printer</h1>
                    <p>X6/X6h bluetooth printer</p>
                </header>

                <div class="field">
                    <label for="mac">Printer MAC</label>
                    <input type="text" id="mac" class="input" placeholder="c4:76:44:3f:7f:e3" value="c4:76:44:3f:7f:e3">
                </div>

                <div class="field">
                    <label for="text">QR</label>
                    <input type="text" id="text" class="input" placeholder="" value="">
                </div>

                <div class="actions" style="margin-bottom: 25px;">
                    <button class="button" id="printBtn">Print</button>
                    <button class="button is-secondary" id="resetBtn">Pair</button>
                </div>
            </div>
            
            <div class="card-right">
                <div class="console" id="console">
                    <div class="console-line">> Waiting for logs...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="notice" class="notice">Print job sent!</div>

    <script>
        const apiBase = ''
        const elements = {
          mac: document.getElementById('mac'),
          text: document.getElementById('text'),
          btn: document.getElementById('printBtn'),
          resetBtn: document.getElementById('resetBtn'),
          notice: document.getElementById('notice'),
          console: document.getElementById('console')
        }

        const addLog = (msg) => {
          const line = document.createElement('div')
          line.className = 'console-line'

          if (msg.includes('[Error]')) {
            line.classList.add('is-error')
          }

          line.textContent = `> ${msg}`
          elements.console.appendChild(line)
          elements.console.scrollTop = elements.console.scrollHeight
        }

        // Connect to log stream
        const eventSource = new EventSource('/events')

        eventSource.onmessage = (e) => {
          if (e.data) addLog(e.data)
        }

        eventSource.onerror = () => {
          console.log('EventSource failed. Reconnecting...')
        }

        const showNotice = (msg, color = '#4ade80') => {
          elements.notice.textContent = msg
          elements.notice.style.background = color
          elements.notice.style.transform = 'translateX(0)'

          setTimeout(() => {
            elements.notice.style.transform = 'translateX(200%)'
          }, 3000)
        }

        const printLabel = async () => {
          const text = elements.text.value
          const mac = elements.mac.value

          if (!text) return showNotice('Please enter text', '#ff4b2b')

          elements.btn.textContent = 'Printing...'
          elements.btn.classList.add('is-loading')

          try {
            // First save the MAC to the server config
            await fetch(`${apiBase}/config`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ mac })
            })

            // Then trigger the print
            const res = await fetch(`${apiBase}/print?qr=${encodeURIComponent(text)}`)
            const data = await res.json()

            if (data.success) {
              showNotice('Printed successfully!')
            } else {
              showNotice(data.error || 'Print failed', '#ff4b2b')
            }
          } catch (err) {
            showNotice('Server unreachable', '#ff4b2b')
          } finally {
            elements.btn.textContent = 'Print'
            elements.btn.classList.remove('is-loading')
          }
        }

        // Initialize
        fetch(`${apiBase}/config`)
          .then(r => r.json())
          .then(data => {
            if (data.mac) elements.mac.value = data.mac
          })

        const repairBT = async () => {
          elements.resetBtn.textContent = '...'

          try {
            const res = await fetch(`${apiBase}/reset`)
            if (res.ok) showNotice('Printer connection paired!')
          } catch (err) {
            showNotice('Failed to pair', '#ff4b2b')
          } finally {
            elements.resetBtn.textContent = 'Pair'
          }
        }

        elements.btn.addEventListener('click', printLabel)
        elements.resetBtn.addEventListener('click', repairBT)
    </script>
</body>
</html>
